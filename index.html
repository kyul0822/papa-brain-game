<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>아빠 기억훈련</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#eef7f1;
padding:10px;
}

img{
width:250px;
border-radius:10px;
margin:10px;
}

button{
font-size:18px;
padding:12px;
margin:6px;
width:180px;
}

.result{
font-size:18px;
margin:5px;
}

</style>

</head>

<body>

<h2 id="title"></h2>

<div id="game"></div>

<script>

const topics={

monday:["산","강","나무","꽃","숲","바다","구름","계곡","돌","풀"],

tuesday:["붕어","잉어","메기","송어","쏘가리","가물치","피라미","동자개","향어","몰개"],

wednesday:["밥","김치","라면","만두","국","비빔밥","불고기","떡","잡채","된장찌개"],

thursday:["개","고양이","소","말","돼지","닭","토끼","사슴","양","오리"],

friday:["컵","의자","시계","안경","신발","우산","가방","전화기","책","연필"],

saturday:["자동차","버스","기차","자전거","비행기","배","택시","지하철","트럭","오토바이"],

sunday:["눈","비","단풍","벚꽃","낙엽","구름","햇빛","바람","여름","겨울"]

}

const days=["sunday","monday","tuesday","wednesday","thursday","friday","saturday"]

const today=new Date().getDay()

const words=topics[days[today]]

let question=0
let score=0
let results=[]

const game=document.getElementById("game")

nextQuestion()

function nextQuestion(){

if(question>=10){

showFinal()

return

}

question++

game.innerHTML=""

document.getElementById("title").innerText=question+" / 10"

const answer=words[Math.floor(Math.random()*words.length)]

const img=document.createElement("img")

img.src="https://picsum.photos/300?"+answer

game.appendChild(img)

let options=[...words]

options.sort(()=>0.5-Math.random())

options=options.slice(0,5)

options.forEach(opt=>{

const btn=document.createElement("button")

btn.innerText=opt

btn.onclick=()=>checkAnswer(opt,answer)

game.appendChild(btn)

})

}

function checkAnswer(choice,answer){

let text=""

if(choice===answer){

score++

text="⭕ 정답"

results.push("⭕ "+answer)

}else{

text="❌ 오답 (정답 "+answer+")"

results.push("❌ "+choice+" → "+answer)

}

alert(text)

nextQuestion()

}

function showFinal(){

document.getElementById("title").innerText="오늘 결과"

game.innerHTML=""

results.forEach((r,i)=>{

const div=document.createElement("div")

div.className="result"

div.innerText=(i+1)+"번 "+r

game.appendChild(div)

})

const scoreDiv=document.createElement("h3")

scoreDiv.innerText="점수 : "+score+" / 10"

game.appendChild(scoreDiv)

}

</script>

</body>

</html>
