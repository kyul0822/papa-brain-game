<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>그림 기억 퀴즈</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f5f5f5;
}

img{
width:280px;
height:280px;
object-fit:cover;
border-radius:10px;
margin:20px;
}

button{
display:block;
margin:10px auto;
padding:12px;
font-size:20px;
width:220px;
}

</style>

</head>

<body>

<h1>그림 기억 퀴즈</h1>

<div id="start">

<h2>주제를 선택하세요</h2>

<button onclick="start('nature')">자연</button>
<button onclick="start('fish')">민물고기</button>
<button onclick="start('food')">한국 음식</button>
<button onclick="start('animal')">동물</button>
<button onclick="start('item')">생활용품</button>
<button onclick="start('transport')">교통수단</button>
<button onclick="start('weather')">계절 / 날씨</button>

</div>

<div id="game" style="display:none">

<h2 id="question"></h2>

<img id="image">

<div id="choices"></div>

<p id="result"></p>

</div>

<script>

const data = {

nature:[
{kr:"산",en:"mountain"},
{kr:"강",en:"river"},
{kr:"나무",en:"tree"},
{kr:"꽃",en:"flower"},
{kr:"숲",en:"forest"}
],

fish:[
{kr:"붕어",en:"carp"},
{kr:"잉어",en:"koi fish"},
{kr:"메기",en:"catfish"},
{kr:"송어",en:"trout"},
{kr:"가물치",en:"snakehead fish"}
],

food:[
{kr:"김치",en:"kimchi"},
{kr:"라면",en:"ramen"},
{kr:"만두",en:"dumpling"},
{kr:"밥",en:"rice"},
{kr:"비빔밥",en:"bibimbap"}
],

animal:[
{kr:"개",en:"dog"},
{kr:"고양이",en:"cat"},
{kr:"소",en:"cow"},
{kr:"말",en:"horse"},
{kr:"호랑이",en:"tiger"}
],

item:[
{kr:"컵",en:"cup"},
{kr:"의자",en:"chair"},
{kr:"시계",en:"clock"},
{kr:"안경",en:"glasses"},
{kr:"우산",en:"umbrella"}
],

transport:[
{kr:"자동차",en:"car"},
{kr:"버스",en:"bus"},
{kr:"기차",en:"train"},
{kr:"자전거",en:"bicycle"},
{kr:"비행기",en:"airplane"}
],

weather:[
{kr:"눈",en:"snow"},
{kr:"비",en:"rain"},
{kr:"단풍",en:"autumn leaves"},
{kr:"벚꽃",en:"cherry blossom"},
{kr:"구름",en:"cloud"}
]

}

let topic
let questions=[]
let current=0
let score=0

function start(t){

topic=data[t]

document.getElementById("start").style.display="none"
document.getElementById("game").style.display="block"

for(let i=0;i<10;i++){

let r=topic[Math.floor(Math.random()*topic.length)]

questions.push(r)

}

show()

}

function show(){

let q=questions[current]

document.getElementById("question").innerText=
"문제 "+(current+1)+" 아래 그림은 무엇인가요?"

document.getElementById("image").src=
"https://source.unsplash.com/400x400/?"+q.en

let options=[q]

while(options.length<5){

let r=topic[Math.floor(Math.random()*topic.length)]

if(!options.includes(r)) options.push(r)

}

options.sort(()=>Math.random()-0.5)

let html=""

options.forEach(o=>{

html+=`<button onclick="check('${o.kr}')">${o.kr}</button>`

})

document.getElementById("choices").innerHTML=html

}

function check(answer){

let correct=questions[current].kr

if(answer==correct){

document.getElementById("result").innerText="정답입니다!"
score++

}else{

document.getElementById("result").innerText="오답입니다. 정답: "+correct

}

setTimeout(next,1500)

}

function next(){

current++

document.getElementById("result").innerText=""

if(current>=10){

document.getElementById("game").innerHTML=

"<h2>게임 종료</h2>"+
"<p>맞은 개수 : "+score+" / 10</p>"+
"<button onclick='location.reload()'>다시 하기</button>"

}else{

show()

}

}

</script>

</body>

</html>
