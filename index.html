<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>아빠 기억훈련</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#eef7f1;
padding:10px;
}

img{
width:260px;
border-radius:10px;
margin:15px;
}

button{
font-size:20px;
padding:12px;
margin:6px;
width:200px;
}

</style>

</head>

<body>

<h2 id="title"></h2>

<div id="game"></div>

<script>

const topics={

monday:{
"산":"https://upload.wikimedia.org/wikipedia/commons/3/3f/Mountain.jpg",
"강":"https://upload.wikimedia.org/wikipedia/commons/2/24/River.jpg",

"꽃":"https://upload.wikimedia.org/wikipedia/commons/4/40/Flower.jpg",
"숲":"https://upload.wikimedia.org/wikipedia/commons/0/0c/Forest.jpg",
"바다":"https://upload.wikimedia.org/wikipedia/commons/5/5e/Ocean.jpg",
"구름":"https://upload.wikimedia.org/wikipedia/commons/0/0f/Clouds.jpg"
},

tuesday:{
"붕어":"https://upload.wikimedia.org/wikipedia/commons/7/7a/Carassius_carassius.jpg",
"잉어":"https://upload.wikimedia.org/wikipedia/commons/2/25/Common_carp.jpg",
"메기":"https://upload.wikimedia.org/wikipedia/commons/3/31/Catfish.jpg",
"송어":"https://upload.wikimedia.org/wikipedia/commons/2/23/Trout.jpg",
"쏘가리":"https://upload.wikimedia.org/wikipedia/commons/f/f1/Mandarin_fish.jpg",
"가물치":"https://upload.wikimedia.org/wikipedia/commons/2/26/Snakehead.jpg"
},

wednesday:{
"밥":"https://upload.wikimedia.org/wikipedia/commons/6/60/Steamed_rice.jpg",
"김치":"https://upload.wikimedia.org/wikipedia/commons/7/74/Kimchi.jpg",
"라면":"https://upload.wikimedia.org/wikipedia/commons/a/a8/Ramen.jpg",
"만두":"https://upload.wikimedia.org/wikipedia/commons/6/6f/Dumplings.jpg",
"비빔밥":"https://upload.wikimedia.org/wikipedia/commons/4/44/Bibimbap.jpg",
"불고기":"https://upload.wikimedia.org/wikipedia/commons/7/7a/Bulgogi.jpg"
},

thursday:{
"개":"https://upload.wikimedia.org/wikipedia/commons/6/6e/Golde33443.jpg",
"고양이":"https://upload.wikimedia.org/wikipedia/commons/3/3a/Cat.jpg",
"소":"https://upload.wikimedia.org/wikipedia/commons/7/7b/Cow.jpg",
"말":"https://upload.wikimedia.org/wikipedia/commons/1/17/Horse.jpg",
"돼지":"https://upload.wikimedia.org/wikipedia/commons/5/5c/Pig.jpg",
"닭":"https://upload.wikimedia.org/wikipedia/commons/3/37/Chicken.jpg"
},

friday:{
"컵":"https://upload.wikimedia.org/wikipedia/commons/7/78/Cup.jpg",
"의자":"https://upload.wikimedia.org/wikipedia/commons/5/5c/Chair.jpg",
"시계":"https://upload.wikimedia.org/wikipedia/commons/3/3a/Clock.jpg",
"안경":"https://upload.wikimedia.org/wikipedia/commons/1/16/Glasses.jpg",
"신발":"https://upload.wikimedia.org/wikipedia/commons/2/20/Shoes.jpg",
"우산":"https://upload.wikimedia.org/wikipedia/commons/2/29/Umbrella.jpg"
},

saturday:{
"자동차":"https://upload.wikimedia.org/wikipedia/commons/3/3e/Car.jpg",
"버스":"https://upload.wikimedia.org/wikipedia/commons/6/6b/Bus.jpg",
"기차":"https://upload.wikimedia.org/wikipedia/commons/1/10/Train.jpg",
"자전거":"https://upload.wikimedia.org/wikipedia/commons/0/0c/Bicycle.jpg",
"비행기":"https://upload.wikimedia.org/wikipedia/commons/2/27/Airplane.jpg",
"배":"https://upload.wikimedia.org/wikipedia/commons/9/9c/Ship.jpg"
},

sunday:{
"눈":"https://upload.wikimedia.org/wikipedia/commons/2/2c/Snow.jpg",
"비":"https://upload.wikimedia.org/wikipedia/commons/5/5f/Rain.jpg",
"단풍":"https://upload.wikimedia.org/wikipedia/commons/5/5c/Autumn_leaves.jpg",
"벚꽃":"https://upload.wikimedia.org/wikipedia/commons/0/0f/Cherry_blossom.jpg",
"낙엽":"https://upload.wikimedia.org/wikipedia/commons/a/a2/Fallen_leaves.jpg",
"햇빛":"https://upload.wikimedia.org/wikipedia/commons/c/c3/Sun.jpg"
}

}

const days=["sunday","monday","tuesday","wednesday","thursday","friday","saturday"]

const today=new Date().getDay()

const data=topics[days[today]]

const words=Object.keys(data)

let question=0
let score=0
let results=[]

const game=document.getElementById("game")

nextQuestion()

function nextQuestion(){

if(question>=10){

showFinal()

return

}

question++

game.innerHTML=""

document.getElementById("title").innerText=question+" / 10"

const answer=words[Math.floor(Math.random()*words.length)]

const img=document.createElement("img")

img.src=data[answer]

game.appendChild(img)

let options=[...words]

options.sort(()=>0.5-Math.random())

options=options.slice(0,5)

options.forEach(opt=>{

const btn=document.createElement("button")

btn.innerText=opt

btn.onclick=()=>checkAnswer(opt,answer)

game.appendChild(btn)

})

}

function checkAnswer(choice,answer){

if(choice===answer){

score++

alert("정답입니다 👍")

results.push("⭕ "+answer)

}else{

alert("틀렸습니다\n정답: "+answer)

results.push("❌ "+choice+" → "+answer)

}

nextQuestion()

}

function showFinal(){

document.getElementById("title").innerText="오늘 결과"

game.innerHTML=""

results.forEach((r,i)=>{

const div=document.createElement("div")

div.innerText=(i+1)+"번 "+r

game.appendChild(div)

})

const scoreDiv=document.createElement("h3")

scoreDiv.innerText="점수 : "+score+" / 10"

game.appendChild(scoreDiv)

}

</script>

</body>

</html>
