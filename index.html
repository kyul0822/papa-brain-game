<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>그림 기억 퀴즈</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f0f0f0;
}

img{
width:300px;
height:300px;
object-fit:cover;
border-radius:10px;
margin:20px;
}

button{
display:block;
margin:10px auto;
padding:12px;
font-size:18px;
width:200px;
}

</style>

</head>

<body>

<h1>그림 기억 퀴즈</h1>

<div id="start">

<h2>주제를 선택하세요</h2>

<button onclick="start('nature')">자연</button>
<button onclick="start('fish')">민물고기</button>
<button onclick="start('food')">한국음식</button>
<button onclick="start('animal')">동물</button>
<button onclick="start('item')">생활용품</button>
<button onclick="start('transport')">교통수단</button>
<button onclick="start('weather')">계절/날씨</button>

</div>

<div id="game" style="display:none">

<h2 id="question"></h2>

<img id="image">

<div id="choices"></div>

<p id="result"></p>

</div>

<script>

const data = {

nature:["mountain","river","tree","flower","forest","rock","lake"],

fish:["carp","catfish","trout","eel","goldfish","freshwater fish"],

food:["kimchi","ramen","dumpling","rice","soup","bibimbap"],

animal:["tiger","dog","cat","horse","elephant","cow"],

item:["cup","chair","clock","glasses","umbrella","shoes"],

transport:["bus","car","train","bicycle","airplane","ship"],

weather:["snow","rain","autumn leaves","cherry blossom","cloud","sun"]

}

let topic
let questionList=[]
let current=0
let score=0

function start(t){

topic=t

document.getElementById("start").style.display="none"
document.getElementById("game").style.display="block"

for(let i=0;i<10;i++){

let arr=data[topic]
let word=arr[Math.floor(Math.random()*arr.length)]

questionList.push(word)

}

show()

}

function show(){

let word=questionList[current]

document.getElementById("question").innerText="문제 "+(current+1)+" 아래 그림은 무엇인가요?"

document.getElementById("image").src=
"https://source.unsplash.com/400x400/?"+word

let options=[word]

let pool=[
"tiger","dog","car","bus","train","tree","flower","river","kimchi","ramen","cup","chair","snow","rain","bicycle"
]

while(options.length<5){

let r=pool[Math.floor(Math.random()*pool.length)]

if(!options.includes(r)) options.push(r)

}

options.sort(()=>Math.random()-0.5)

let html=""

options.forEach(o=>{

html+=`<button onclick="check('${o}')">${o}</button>`

})

document.getElementById("choices").innerHTML=html

}

function check(answer){

let correct=questionList[current]

if(answer==correct){

document.getElementById("result").innerText="정답입니다!"
score++

}else{

document.getElementById("result").innerText="오답입니다. 정답: "+correct

}

setTimeout(next,1500)

}

function next(){

current++

if(current>=10){

document.getElementById("game").innerHTML=

"<h2>게임 종료</h2>"+
"<p>맞은 개수 : "+score+" / 10</p>"+
"<button onclick='location.reload()'>다시 하기</button>"

}else{

show()

}

}

</script>

</body>

</html>
